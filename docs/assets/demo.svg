<svg xmlns="http://www.w3.org/2000/svg" width="760" height="424" viewBox="0 0 760 424" font-family="Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="424" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="380" y="27" fill="#8b949e" text-anchor="middle" font-size="12">samlpeek — why did this SSO login fail?</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> samlpeek lint --now 2026-07-12T09:01:00Z examples/bad-response.b64</text>
    <text x="24" y="92"><tspan fill="#79c0ff">samlpeek lint</tspan> — SAML Response, evaluated at 2026-07-12T09:01:00Z (skew 1m30s)</text>
    <text x="24" y="124"><tspan fill="#f85149">ERROR</tspan>  <tspan fill="#d2a8ff">assertion-expired</tspan>      Conditions NotOnOrAfter is 23h56m in the past;</text>
    <text x="24" y="142">                              the assertion is dead — re-test with a fresh login</text>
    <text x="24" y="166"><tspan fill="#f85149">ERROR</tspan>  <tspan fill="#d2a8ff">bearer-expired</tspan>         bearer NotOnOrAfter is 23h56m in the past</text>
    <text x="24" y="190"><tspan fill="#f85149">ERROR</tspan>  <tspan fill="#d2a8ff">certificate-expired</tspan>    CN=old-idp.example.test expired 2021-01-01</text>
    <text x="24" y="214"><tspan fill="#f85149">ERROR</tspan>  <tspan fill="#d2a8ff">nameid-comment</tspan>         NameID "alice@example.test.attacker.test"</text>
    <text x="24" y="232">                              contains an XML comment — reject this message</text>
    <text x="24" y="256"><tspan fill="#d29922">WARN</tspan>   <tspan fill="#d2a8ff">bearer-no-recipient</tspan>       no Recipient on the bearer confirmation</text>
    <text x="24" y="280"><tspan fill="#d29922">WARN</tspan>   <tspan fill="#d2a8ff">no-audience-restriction</tspan>   replayable to any SP that trusts this IdP</text>
    <text x="24" y="304"><tspan fill="#d29922">WARN</tspan>   <tspan fill="#d2a8ff">weak-digest-algorithm</tspan>     digest uses sha1; move the IdP to sha256</text>
    <text x="24" y="328"><tspan fill="#d29922">WARN</tspan>   <tspan fill="#d2a8ff">weak-signature-algorithm</tspan>  signed with rsa-sha1; move to rsa-sha256</text>
    <text x="24" y="352"><tspan fill="#8b949e">INFO   response-not-signed       assertion is signed, which most SPs accept</tspan></text>
    <text x="24" y="386">4 errors, 4 warnings, 1 info — <tspan fill="#f85149" font-weight="bold">FAIL</tspan>  <tspan fill="#8b949e">(exit 1)</tspan></text>
  </g>
</svg>
